<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <h3>Delete Task</h3>
        <div class="delete-confirmation">
            <p>Are you sure you want to delete: <strong>{{ item }}</strong>?</p>
        </div>
        <form method="POST" action="" class="button-group">
            {% csrf_token %}
            <a href="{% url 'list' %}" class="cancel-btn">Cancel</a>
            <input type="submit" value="Confirm Delete" class="confirm-btn">
        </form>
    </div>
</body>
</html>
